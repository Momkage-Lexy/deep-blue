name: Publish 🚀

on:
  workflow_dispatch:
  push:
    branches:
      - deployment

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  publish:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup .NET 9
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      # Step 3: Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 4: Install Playwright + Chromium into user cache
      - name: Install Playwright and Chromium
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Debug: List contents of Playwright install folder
        run: |
          $basePath = "$env:USERPROFILE\AppData\Local\ms-playwright"
          Write-Host "Checking ms-playwright directory: $basePath"
          if (Test-Path $basePath) {
            Get-ChildItem -Path $basePath -Recurse | Select-Object FullName
          } else {
            Write-Host "❌ ms-playwright folder not found."
          }
        shell: pwsh

      # Step 5: Copy Chromium from user cache into the project directory
      - name: Copy Chromium to ms-playwright folder
        run: |
          $sourceDir = Get-ChildItem "$env:USERPROFILE\AppData\Local\ms-playwright" -Directory | Where-Object { $_.Name -like "chromium-*" } | Select-Object -First 1
          $sourcePath = Join-Path $sourceDir.FullName "chrome-win"
          $targetPath = "${{ github.workspace }}\Uxcheckmate\Uxcheckmate_Main\ms-playwright\chromium_headless_shell-1169\chrome-win"
          echo "Copying Chromium from $sourcePath to $targetPath"
          New-Item -ItemType Directory -Path $targetPath -Force | Out-Null
          Copy-Item -Path "$sourcePath\*" -Destination $targetPath -Recurse -Force
        shell: pwsh

      # Step 6: Clean up local Playwright cache to reduce ZIP size
      - name: Clean up ms-playwright cache from user profile
        run: |
          Remove-Item -Recurse -Force "$env:USERPROFILE\AppData\Local\ms-playwright" -ErrorAction SilentlyContinue
        shell: pwsh

      # Step 7: Restore dependencies
      - name: Restore .NET dependencies
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet restore

      # Step 8: Build the project
      - name: Build .NET project
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet build --configuration Release

      # Step 9: Publish the project to the output directory
      - name: Publish .NET project
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet publish --configuration Release --output ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      # Step 10: Copy ms-playwright folder into published output
      - name: Copy ms-playwright to publish output
        run: |
          $src = "${{ github.workspace }}\Uxcheckmate\Uxcheckmate_Main\ms-playwright"
          $dest = "${{ github.workspace }}\${{ env.AZURE_WEBAPP_PACKAGE_PATH }}\ms-playwright"
          Copy-Item -Path $src -Destination $dest -Recurse -Force
        shell: pwsh

      # Step 11: Verify Chromium binary in publish output
      - name: Verify headless_shell.exe is in publish folder
        run: |
          $target = "${{ github.workspace }}\${{ env.AZURE_WEBAPP_PACKAGE_PATH }}\ms-playwright\chromium_headless_shell-1169\chrome-win\headless_shell.exe"
          if (!(Test-Path $target)) {
            throw "ERROR: headless_shell.exe not found in publish output!"
          } else {
            Write-Host "✅ headless_shell.exe found at expected location."
          }
        shell: pwsh

      # Step 12: Deploy to Azure Web App using publish profile
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
