name: Publish 🚀

on:
  workflow_dispatch:
  push:
    branches:
      - deployment

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Playwright (optional)
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Restore dependencies
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet restore

      - name: Build project
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet build --configuration Release

      - name: Publish project
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet publish --configuration Release --output ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Include post-deployment script
        run: |
          cp .deployment ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          cp deploy.ps1 ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
