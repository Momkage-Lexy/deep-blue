name: Publish 🚀

on:
  workflow_dispatch:
  push:
    branches:
      - deployment

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install Playwright and Chromium
      - name: Install Playwright and Chromium
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      # Locate downloaded Chromium and copy it into the correct structure
      - name: Copy Chromium to ms-playwright folder for publish
        run: |
          $source = Get-ChildItem "$env:USERPROFILE\AppData\Local\ms-playwright" -Directory | Where-Object { $_.Name -like "chromium-*" } | Select-Object -First 1
          $sourcePath = Join-Path $source.FullName "chrome-win"
          $targetPath = "${{ github.workspace }}\Uxcheckmate\Uxcheckmate_Main\ms-playwright\chromium_headless_shell-1169\chrome-win"
          echo "Copying Chromium from $sourcePath to $targetPath"
          New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
          Copy-Item -Path "$sourcePath\*" -Destination $targetPath -Recurse -Force
        shell: pwsh

      # Restore, build, and publish .NET app
      - name: Restore dependencies
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet restore

      - name: Build project
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet build --configuration Release

      - name: Publish project
        working-directory: ./Uxcheckmate/Uxcheckmate_Main
        run: dotnet publish --configuration Release --output ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      # Copy ms-playwright folder into the publish output
      - name: Copy ms-playwright to publish output
        run: |
          $src = "${{ github.workspace }}\Uxcheckmate\Uxcheckmate_Main\ms-playwright"
          $dest = "${{ github.workspace }}\${{ env.AZURE_WEBAPP_PACKAGE_PATH }}\ms-playwright"
          echo "Copying $src to $dest"
          Copy-Item $src -Destination $dest -Recurse -Force
        shell: pwsh

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

