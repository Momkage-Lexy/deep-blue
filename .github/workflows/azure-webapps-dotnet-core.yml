name: Publish 🚀

on:
  workflow_dispatch:
  push:
    branches:
      - deployment

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: "/home/site/wwwroot"
  DB_STRING_SECRET: ${{ secrets.DBCONNECTION }}

jobs:
  publish:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
        working-directory: ./Uxcheckmate/Uxcheckmate_Main

      - name: Restore .NET dependencies
        run: dotnet restore ./Uxcheckmate/Uxcheckmate.sln

      - name: Build project
        run: dotnet build ./Uxcheckmate/Uxcheckmate.sln --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish ./Uxcheckmate/Uxcheckmate_Main/Uxcheckmate_Main.csproj --configuration Release --output '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'
      
      - name: Create deployment marker file
        run: |
          echo "Deployment built on $(date)" > ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/deployment-test.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
