name: Publish 🚀

on:
  workflow_dispatch:
  push:
    branches:
      - deployment

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  publish:
    runs-on: ubuntu-latest  # ✅ Build on Linux for Playwright consistency
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
        working-directory: ./Uxcheckmate/Uxcheckmate_Main

      - name: Install Playwright Browsers locally
        run: npx playwright install --with-deps
        working-directory: ./Uxcheckmate/Uxcheckmate_Main

      - name: Restore .NET dependencies
        run: dotnet restore
        working-directory: ./Uxcheckmate/Uxcheckmate_Main

      - name: Build project
        run: dotnet build --configuration Release
        working-directory: ./Uxcheckmate/Uxcheckmate_Main

      - name: Publish project
        run: dotnet publish --configuration Release --output ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
        working-directory: ./Uxcheckmate/Uxcheckmate_Main

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
